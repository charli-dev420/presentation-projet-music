<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">DAWWW-CORE project workflow</title>
  <desc id="desc">Create, save, reopen, edit, export and continue through a portable .dw project.</desc>
  <rect width="1200" height="260" rx="24" fill="#111827"/>
  <text x="600" y="47" text-anchor="middle" fill="#f8fafc" font-family="system-ui,Segoe UI,sans-serif" font-size="27" font-weight="700">DAWWW-CORE project loop</text>
  <text x="600" y="76" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,Segoe UI,sans-serif" font-size="16">Portable .dw continuity from creation to the next session</text>

  <g font-family="system-ui,Segoe UI,sans-serif" font-size="17" font-weight="700" text-anchor="middle">
    <rect x="55" y="112" width="150" height="72" rx="18" fill="#f7f1e5"/>
    <text x="130" y="155" fill="#172033">Create</text>

    <rect x="245" y="112" width="150" height="72" rx="18" fill="#f7f1e5"/>
    <text x="320" y="155" fill="#172033">Save</text>

    <rect x="435" y="112" width="150" height="72" rx="18" fill="#d8a15d"/>
    <text x="510" y="155" fill="#172033">Reopen</text>

    <rect x="625" y="112" width="150" height="72" rx="18" fill="#f7f1e5"/>
    <text x="700" y="155" fill="#172033">Edit</text>

    <rect x="815" y="112" width="150" height="72" rx="18" fill="#f7f1e5"/>
    <text x="890" y="155" fill="#172033">Export</text>

    <rect x="1005" y="112" width="150" height="72" rx="18" fill="#0f4c5c"/>
    <text x="1080" y="155" fill="#ffffff">Continue</text>
  </g>

  <g stroke="#d8a15d" stroke-width="4" fill="none">
    <path d="M205 148 H240"/>
    <path d="M395 148 H430"/>
    <path d="M585 148 H620"/>
    <path d="M775 148 H810"/>
    <path d="M965 148 H1000"/>
  </g>
  <g fill="#d8a15d">
    <path d="M240 148 l-10 -7 v14 z"/>
    <path d="M430 148 l-10 -7 v14 z"/>
    <path d="M620 148 l-10 -7 v14 z"/>
    <path d="M810 148 l-10 -7 v14 z"/>
    <path d="M1000 148 l-10 -7 v14 z"/>
  </g>

  <rect x="405" y="205" width="210" height="34" rx="17" fill="#6b3f2f"/>
  <text x="510" y="228" text-anchor="middle" fill="#ffffff" font-family="system-ui,Segoe UI,sans-serif" font-size="15" font-weight="700">portable .dw project</text>
</svg>
