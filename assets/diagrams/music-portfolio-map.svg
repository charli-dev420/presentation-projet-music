<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Music portfolio map</title>
  <desc id="desc">Two separate product lines: DAWWW-CORE browser DAW and UnicorSoundEngine native plugin ecosystem.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text x="600" y="62" text-anchor="middle" fill="#f8fafc" font-family="system-ui,Segoe UI,sans-serif" font-size="31" font-weight="700">Music software portfolio</text>
  <text x="600" y="96" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,Segoe UI,sans-serif" font-size="17">One portfolio · two separate product lines · distinct runtimes</text>

  <rect x="70" y="140" width="490" height="340" rx="24" fill="#f7f1e5" filter="url(#shadow)"/>
  <rect x="640" y="140" width="490" height="340" rx="24" fill="#f7f1e5" filter="url(#shadow)"/>

  <rect x="70" y="140" width="490" height="74" rx="24" fill="#0f4c5c"/>
  <rect x="70" y="190" width="490" height="24" fill="#0f4c5c"/>
  <text x="105" y="187" fill="#ffffff" font-family="system-ui,Segoe UI,sans-serif" font-size="29" font-weight="700">DAWWW-CORE</text>
  <text x="105" y="246" fill="#172033" font-family="system-ui,Segoe UI,sans-serif" font-size="19" font-weight="650">Browser DAW · Web Audio · local-first</text>
  <text x="105" y="286" fill="#374151" font-family="system-ui,Segoe UI,sans-serif" font-size="17">• Arrange, sequence, mix and export</text>
  <text x="105" y="321" fill="#374151" font-family="system-ui,Segoe UI,sans-serif" font-size="17">• Portable .dw project continuity</text>
  <text x="105" y="356" fill="#374151" font-family="system-ui,Segoe UI,sans-serif" font-size="17">• Recovery and reopen workflows</text>
  <text x="105" y="391" fill="#374151" font-family="system-ui,Segoe UI,sans-serif" font-size="17">• Android test target via Capacitor</text>
  <rect x="105" y="423" width="315" height="36" rx="18" fill="#d8a15d"/>
  <text x="262.5" y="447" text-anchor="middle" fill="#172033" font-family="system-ui,Segoe UI,sans-serif" font-size="15" font-weight="700">No native VST hosting in the browser</text>

  <rect x="640" y="140" width="490" height="74" rx="24" fill="#6b3f2f"/>
  <rect x="640" y="190" width="490" height="24" fill="#6b3f2f"/>
  <text x="675" y="187" fill="#ffffff" font-family="system-ui,Segoe UI,sans-serif" font-size="29" font-weight="700">UnicorSoundEngine</text>
  <text x="675" y="246" fill="#172033" font-family="system-ui,Segoe UI,sans-serif" font-size="19" font-weight="650">Native instruments · FX · product line</text>
  <text x="675" y="286" fill="#374151" font-family="system-ui,Segoe UI,sans-serif" font-size="17">• Seven instrument families</text>
  <text x="675" y="321" fill="#374151" font-family="system-ui,Segoe UI,sans-serif" font-size="17">• Effects and audio processing tools</text>
  <text x="675" y="356" fill="#374151" font-family="system-ui,Segoe UI,sans-serif" font-size="17">• Presets, manuals and audition</text>
  <text x="675" y="391" fill="#374151" font-family="system-ui,Segoe UI,sans-serif" font-size="17">• Packaging and distribution surfaces</text>
  <rect x="675" y="423" width="300" height="36" rx="18" fill="#d8a15d"/>
  <text x="825" y="447" text-anchor="middle" fill="#172033" font-family="system-ui,Segoe UI,sans-serif" font-size="15" font-weight="700">Separate native plugin ecosystem</text>

  <path d="M565 310 H635" stroke="#d8a15d" stroke-width="4" stroke-dasharray="9 9"/>
  <circle cx="600" cy="310" r="12" fill="#d8a15d"/>
  <text x="600" y="515" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,Segoe UI,sans-serif" font-size="16">Shared music-tech direction, separate execution and release paths</text>
</svg>
