  <rect width="1200" height="675" fill="#111827"/>
  <text x="72" y="86" fill="#f9fafb" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">QA Matrix · DAW Core</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="20">
